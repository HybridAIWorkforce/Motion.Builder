name: Automated Code Review

on:
  schedule:
    - cron: '0 9 * * 1'
    - cron: '0 9 * * 4'
  workflow_dispatch:

jobs:
  review-stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-pr-message: '🤖 This PR has been inactive for 7 days.'
          days-before-pr-stale: 7
          days-before-pr-close: 30
          stale-pr-label: 'stale'
